<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atom Space CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-text: #085041;
    --purple-light: #EEEDFE;
    --purple-text: #3C3489;
    --blue-light: #E6F1FB;
    --blue-text: #185FA5;
    --amber-light: #FAEEDA;
    --amber-text: #633806;
    --red-light: #FCEBEB;
    --red-text: #A32D2D;
    --gray-light: #F1EFE8;
    --border: rgba(0,0,0,0.1);
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --text: #1a1a18;
    --text2: #6b6b67;
    --radius: 8px;
    --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

  /* AUTH */
  .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .auth-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 360px; }
  .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .auth-logo-icon { width: 36px; height: 36px; background: var(--green); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .auth-logo-icon svg { width: 20px; height: 20px; fill: white; }
  .auth-title { font-size: 16px; font-weight: 600; }
  .auth-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .form-label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .form-input { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--bg); color: var(--text); margin-bottom: 12px; outline: none; }
  .form-input:focus { border-color: var(--green); }
  .auth-error { font-size: 12px; color: var(--red-text); background: var(--red-light); padding: 8px 12px; border-radius: var(--radius); margin-bottom: 12px; display: none; }
  .btn-full { width: 100%; padding: 10px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-full:hover { background: var(--green-dark); }

  /* LAYOUT */
  .app { display: none; flex-direction: column; min-height: 100vh; }
  .header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 28px; height: 28px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 14px; height: 14px; fill: white; }
  .logo-name { font-size: 14px; font-weight: 600; }
  .nav { display: flex; gap: 2px; }
  .nav-btn { padding: 6px 14px; border-radius: var(--radius); border: none; font-size: 13px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.15s; }
  .nav-btn:hover { background: var(--bg2); color: var(--text); }
  .nav-btn.active { background: var(--bg2); color: var(--text); font-weight: 500; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-pill { display: flex; align-items: center; gap: 8px; padding: 5px 10px; border: 0.5px solid var(--border); border-radius: 99px; background: var(--bg2); font-size: 12px; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .role-badge { padding: 2px 7px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .rb-admin { background: var(--purple-light); color: var(--purple-text); }
  .rb-mentor { background: var(--green-light); color: var(--green-text); }
  .rb-reception { background: var(--blue-light); color: var(--blue-text); }
  .btn-logout { padding: 5px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); background: transparent; font-size: 12px; cursor: pointer; color: var(--text2); }
  .btn-logout:hover { background: var(--bg2); }
  .content { flex: 1; padding: 24px 20px; max-width: 1100px; margin: 0 auto; width: 100%; }
  .section { display: none; }
  .section.active { display: block; }

  /* COMPONENTS */
  .sec-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .sec-title { font-size: 16px; font-weight: 600; }
  .btn-primary { padding: 7px 16px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-ghost { padding: 7px 14px; border: 0.5px solid var(--border); border-radius: var(--radius); background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); }
  .btn-ghost:hover { background: var(--bg2); }
  .table-wrap { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .data-table th { text-align: left; padding: 9px 14px; font-size: 12px; font-weight: 500; color: var(--text2); border-bottom: 0.5px solid var(--border); background: var(--bg2); }
  .data-table td { padding: 10px 14px; border-bottom: 0.5px solid var(--border); color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--bg2); cursor: pointer; }
  .name-cell { display: flex; align-items: center; gap: 8px; }
  .badge { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .b-active { background: var(--green-light); color: var(--green-text); }
  .b-draft { background: var(--gray-light); color: #5F5E5A; }
  .b-import { background: var(--purple-light); color: var(--purple-text); }
  .notice { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .notice strong { color: var(--text); }
  .empty-state { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
  .search-input { padding: 7px 12px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); width: 200px; outline: none; }
  .search-input:focus { border-color: var(--green); }

  /* COURSES */
  .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .course-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: border-color 0.15s; }
  .course-card:hover { border-color: rgba(0,0,0,0.25); }
  .course-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .course-meta { font-size: 12px; color: var(--text2); display: flex; flex-direction: column; gap: 3px; }

  /* COURSE DETAIL */
  .back-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: none; font-size: 13px; color: var(--text2); cursor: pointer; margin-bottom: 16px; padding: 0; }
  .back-btn:hover { color: var(--text); }
  .detail-tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 20px; }
  .dtab { padding: 8px 16px; font-size: 13px; cursor: pointer; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--text2); }
  .dtab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }
  .dtab-pane { display: none; }
  .dtab-pane.active { display: block; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .info-card { background: var(--bg2); border-radius: var(--radius-lg); padding: 14px; }
  .info-card-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .info-row span:first-child { color: var(--text2); }
  .info-row span:last-child { font-weight: 500; }
  .mentor-card { display: flex; align-items: center; gap: 12px; background: var(--bg2); border-radius: var(--radius-lg); padding: 14px; }
  .chip { display: inline-block; background: var(--bg); border: 0.5px solid var(--border); border-radius: 99px; padding: 3px 10px; font-size: 12px; margin: 2px; }
  .material-item { display: flex; align-items: center; gap: 10px; background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px; }
  .mat-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .mat-pdf { background: var(--red-light); }
  .mat-ppt { background: var(--amber-light); }
  .mat-link { background: var(--green-light); }

  /* USERS */
  .perm-grid { display: grid; grid-template-columns: 1fr 80px 80px 80px; border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; font-size: 13px; }
  .perm-h { background: var(--bg2); padding: 8px 12px; font-size: 12px; font-weight: 500; color: var(--text2); border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); }
  .perm-h:last-child { border-right: none; }
  .perm-c { padding: 9px 12px; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); }
  .perm-c:last-child { border-right: none; }
  .perm-c.center { text-align: center; }
  .perm-last .perm-c { border-bottom: none; }

  /* MODAL */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); display: flex; align-items: flex-start; justify-content: center; z-index: 100; padding-top: 60px; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 22px; width: 440px; max-width: 95%; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .form-row { margin-bottom: 12px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-select { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); }
  .form-section { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 0.5px solid var(--border); }
  .form-section:last-of-type { border-bottom: none; margin-bottom: 0; }
  .form-section-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .days-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .day-chip { padding: 5px 10px; border: 0.5px solid var(--border); border-radius: 99px; font-size: 12px; cursor: pointer; color: var(--text2); background: transparent; }
  .day-chip.sel { background: var(--green-light); color: var(--green-text); border-color: var(--green); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

  /* PROFILE PANEL */
  .profile-overlay { position: fixed; top: 0; right: 0; width: 320px; height: 100vh; background: var(--bg); border-left: 0.5px solid var(--border); z-index: 50; overflow-y: auto; display: none; }
  .profile-inner { padding: 20px; }
  .profile-close { background: transparent; border: none; font-size: 20px; cursor: pointer; color: var(--text2); float: right; line-height: 1; }
  .p-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 600; margin: 8px auto 10px; }
  .p-name { text-align: center; font-size: 15px; font-weight: 600; }
  .p-sub { text-align: center; font-size: 12px; color: var(--text2); margin-top: 2px; }
  .psec { margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--border); }
  .psec-t { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .prow { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; gap: 8px; }
  .prow span:first-child { color: var(--text2); flex-shrink: 0; }
  .prow span:last-child { color: var(--text); text-align: right; word-break: break-word; font-weight: 500; }
  .p-motivation { font-size: 12px; color: var(--text); line-height: 1.6; padding: 4px 0; }

  /* SCHEDULE */
  .schedule-grid { display: grid; grid-template-columns: 56px repeat(5, 1fr); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg); }
  .sg-h { background: var(--bg2); padding: 8px 6px; text-align: center; font-size: 12px; font-weight: 500; border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); }
  .sg-h:last-child { border-right: none; }
  .sg-t { background: var(--bg2); padding: 8px 4px; text-align: center; font-size: 11px; color: var(--text2); border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); }
  .sg-c { border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); padding: 4px; min-height: 52px; }
  .sg-c:last-child { border-right: none; }
  .sg-last .sg-c, .sg-last .sg-t { border-bottom: none; }
  .sg-event { border-radius: 6px; padding: 4px 6px; font-size: 11px; height: 100%; }
  .sg-event .en { font-weight: 600; }
  .sg-event .es { font-size: 10px; opacity: 0.8; }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></div>
      <div><div class="auth-title">Atom Space CRM</div><div class="auth-sub">Увійдіть до системи</div></div>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <label class="form-label">Email</label>
    <input class="form-input" id="login-email" type="email" placeholder="your@email.com"/>
    <label class="form-label">Пароль</label>
    <input class="form-input" id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-full" onclick="doLogin()" id="login-btn">Увійти</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></div>
      <div class="logo-name">Atom Space</div>
    </div>
    <div class="nav" id="main-nav"></div>
    <div class="header-right">
      <div class="user-pill" id="user-pill"></div>
      <button class="btn-logout" onclick="doLogout()">Вийти</button>
    </div>
  </div>
  <div class="content">
    <div id="section-courses"  class="section"></div>
    <div id="section-students" class="section"></div>
    <div id="section-schedule" class="section"></div>
    <div id="section-users"    class="section"></div>
  </div>
</div>

<div id="modal-container"></div>
<div class="profile-overlay" id="profile-overlay"><div class="profile-inner" id="profile-inner"></div></div>

<script>
// ============================================================
// ВСТАВТЕ ВАШІ КРЕДИ SUPABASE НИЖЧЕ
// ============================================================
const SUPABASE_URL = 'https://XXXXXXXXXXXXXXXX.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';
// ============================================================

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const AVC = ['#E1F5EE|#085041','#EEEDFE|#3C3489','#E6F1FB|#185FA5','#FAEEDA|#633806','#FAECE7|#712B13','#FBEAF0|#72243E'];
const ROLE_LABEL = { admin: 'Адмін', mentor: 'Ментор', reception: 'Ресепшн' };
const DAYS_UA = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
const SCHED_COLORS = ['#E1F5EE|#085041','#E6F1FB|#185FA5','#EEEDFE|#3C3489','#FAEEDA|#633806'];

let currentUser = null;
let courses = [], students = [], allUsers = [];
let activeCourseId = null, activeDetailTab = 'info';

function ini(n){ return n.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase(); }
function avColor(i){ return AVC[i % AVC.length].split('|'); }
function fmt(d){ if(!d) return '—'; const p=d.split('-'); return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:d; }

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('auth-error');
  const btn   = document.getElementById('login-btn');
  err.style.display = 'none';
  btn.textContent = 'Завантаження...'; btn.disabled = true;
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    await loadCurrentUser(data.user);
  } catch(e) {
    err.style.display = 'block';
    err.textContent = e.message === 'Invalid login credentials' ? 'Невірний email або пароль' : e.message;
    btn.textContent = 'Увійти'; btn.disabled = false;
  }
}

async function loadCurrentUser(authUser){
  const { data: profile } = await sb.from('users').select('*').eq('id', authUser.id).single();
  if(!profile){ showError('Ваш профіль не знайдено. Зверніться до адміна.'); await sb.auth.signOut(); return; }
  currentUser = { ...authUser, ...profile };
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildUI();
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser = null; courses = []; students = []; allUsers = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-btn').textContent = 'Увійти';
  document.getElementById('login-btn').disabled = false;
}

function showError(msg){
  const err = document.getElementById('auth-error');
  err.style.display = 'block'; err.textContent = msg;
}

// ── PERMISSIONS ───────────────────────────────────────────────
const PERMS = {
  admin:     { courses:{v:1,e:1,c:1}, students:{v:1,e:1,c:1}, schedule:{v:1,e:1}, users:{v:1,e:1} },
  mentor:    { courses:{v:'own',e:'own',c:0}, students:{v:'own',e:'own',c:0}, schedule:{v:1,e:0}, users:{v:0,e:0} },
  reception: { courses:{v:1,e:0,c:0}, students:{v:1,e:0,c:1}, schedule:{v:1,e:0}, users:{v:0,e:0} },
};
function can(s,a){ const p=PERMS[currentUser.role]; return p[s]&&(p[s][a]===1||p[s][a]==='own'); }
function isOwn(s){ const p=PERMS[currentUser.role]; return p[s]&&(p[s].v==='own'); }

// ── UI BUILDER ────────────────────────────────────────────────
function buildUI(){
  const [bg,tc] = avColor(0);
  const rb = `rb-${currentUser.role}`;
  document.getElementById('user-pill').innerHTML =
    `<div class="avatar" style="background:${bg};color:${tc};">${ini(currentUser.name)}</div>
     <span style="font-size:12px;">${currentUser.name}</span>
     <span class="role-badge ${rb}">${ROLE_LABEL[currentUser.role]}</span>`;

  const sections = [
    {id:'courses',   label:'Курси',        show: can('courses','v')},
    {id:'students',  label:'Студенти',     show: can('students','v')},
    {id:'schedule',  label:'Розклад',      show: can('schedule','v')},
    {id:'users',     label:'Користувачі',  show: can('users','v')},
  ];
  document.getElementById('main-nav').innerHTML = sections.map(s=>
    `<button class="nav-btn" ${s.show?'':'disabled'} onclick="showSection('${s.id}')">${s.label}</button>`
  ).join('');

  const first = sections.find(s=>s.show);
  if(first) showSection(first.id);
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{
    if(b.textContent === ({courses:'Курси',students:'Студенти',schedule:'Розклад',users:'Користувачі'}[id]))
      b.classList.add('active');
  });
  closeProfile();
  ({ courses: renderCoursesList, students: renderStudents, schedule: renderSchedule, users: renderUsers })[id]?.();
}

// ── COURSES ───────────────────────────────────────────────────
async function renderCoursesList(){
  const el = document.getElementById('section-courses');
  el.innerHTML = `<div class="sec-top"><div class="sec-title">Курси</div>${can('courses','c')?'<button class="btn-primary" onclick="openCourseModal()">+ Новий курс</button>':''}</div><div class="loading">Завантаження...</div>`;
  document.getElementById('course-detail-view')?.remove();

  let q = sb.from('courses').select('*').order('created_at', {ascending:false});

function switchTab(tab){

  document.getElementById('dtab-'+tab)?.classList.add('active');
  document.querySelectorAll('.dtab').forEach(b=>{ if(b.textContent.startsWith({info:'Інф',students:'Студ',materials:'Мат'}[tab])) b.classList.add('active'); });
}

async function renderSchedule(){
  const el = document.getElementById('section-schedule');
  el.innerHTML = `<div class="sec-top"><div class="sec-title">Розклад</div></div><div class="loading">Завантаження...</div>`;
  const { data } = await sb.from('courses').select('name, schedule_days, schedule_time, status').eq('status','active');
  const canEdit = can('schedule','e');
  const times = ['09:00','11:00','13:00','15:00','18:00','19:00'];
  const days = ['Пн','Вт','Ср','Чт','Пт'];

  const events = [];
  (data||[]).forEach((c,ci)=>{
    (c.schedule_days||[]).forEach(day=>{
      const di = days.indexOf(day);
      const ti = times.indexOf(c.schedule_time);
      if(di>=0 && ti>=0) events.push({di,ti,name:c.name.split(' ').slice(0,2).join(' '),ci});
    });
  });

  let grid = `<div class="schedule-grid">`;
  grid += `<div class="sg-h"></div>`;
  days.forEach(d=>{ grid+=`<div class="sg-h">${d}</div>`; });
  times.forEach((t,ti)=>{
    const last = ti===times.length-1;
    grid += `<div class="sg-t${last?' sg-last':''}">${t}</div>`;
    days.forEach((_,di)=>{
      const ev = events.find(e=>e.di===di&&e.ti===ti);
      const [bg,tc] = ev ? SCHED_COLORS[ev.ci%SCHED_COLORS.length].split('|') : ['',''];
      grid += `<div class="sg-c${last?' sg-last':''}">${ev?`<div class="sg-event" style="background:${bg};color:${tc};"><div class="en">${ev.name}</div></div>`:''}</div>`;
    });
  });
  grid += '</div>';

  el.innerHTML = `
    <div class="sec-top">
      <div class="sec-title">Розклад</div>
      ${canEdit?'<button class="btn-primary" onclick="openCourseModal()">+ Новий курс</button>':''}
    </div>
    ${!canEdit?'<div class="notice">Тільки перегляд. Для змін зверніться до адміна.</div>':''}
    ${grid}`;
}

    {label:'Курси — перегляд',     a:1, m:'own', r:1},
    {label:'Курси — редагування',  a:1, m:'own', r:0},
    {label:'Студенти — перегляд',  a:1, m:'own', r:1},
    {label:'Студенти — редагування',a:1,m:'own', r:0},
    {label:'Розклад — перегляд',   a:1, m:1,     r:1},
    {label:'Розклад — редагування',a:1, m:0,     r:0},
    {label:'Користувачі',          a:1, m:0,     r:0},
  ];
  const cell = v => v===1?'<span style="color:var(--green);">✓</span>':v==='own'?'<span style="color:#BA7517;">свої</span>':'<span style="color:#D3D1C7;">—</span>';

  el.innerHTML = `
    <div class="sec-top">
      <div class="sec-title">Користувачі</div>
      ${can('users','e')?'<button class="btn-primary" onclick="openUserModal()">+ Додати</button>':''}
    </div>
    <div class="table-wrap" style="margin-bottom:20px;"><table class="data-table">
      <thead><tr><th>Користувач</th><th>Email</th><th>Роль</th><th>Курс</th>${can('users','e')?'<th></th>':''}</tr></thead>
      <tbody>${allUsers.map((u,i)=>{
        const[bg,tc]=avColor(i);
        return `<tr>
          <td><div class="name-cell"><div class="avatar" style="background:${bg};color:${tc};">${ini(u.name)}</div>${u.name}</div></td>
          <td style="color:var(--text2);font-size:12px;">${u.email||'—'}</td>
          <td><span class="role-badge rb-${u.role}">${ROLE_LABEL[u.role]}</span></td>
          <td style="color:var(--text2);font-size:12px;">${u.courses?.name||'—'}</td>
          ${can('users','e')?`<td><button class="btn-ghost" style="font-size:12px;padding:4px 8px;" onclick="openEditUserModal('${u.id}')">Змінити роль</button></td>`:''}
        </tr>`;}).join('')}
      </tbody>
    </table></div>
    <div style="font-size:14px;font-weight:600;margin-bottom:10px;">Матриця прав доступу</div>
    <div class="perm-grid">
      <div class="perm-h">Дія</div>
      <div class="perm-h" style="text-align:center;">Адмін</div>
      <div class="perm-h" style="text-align:center;">Ментор</div>
      <div class="perm-h" style="text-align:center;border-right:none;">Ресепшн</div>
      ${permRows.map((r,i)=>{
        const last = i===permRows.length-1;
        return `<div class="perm-c${last?' perm-last':''}">${r.label}</div>
          <div class="perm-c center${last?' perm-last':''}">${cell(r.a)}</div>
          <div class="perm-c center${last?' perm-last':''}">${cell(r.m)}</div>
          <div class="perm-c center${last?' perm-last':''}" style="border-right:none;">${cell(r.r)}</div>`;
      }).join('')}
    </div>`;
}

function openUserModal(){
  showModal(`<div class="modal">
    <div class="modal-title">Новий користувач</div>
    <div class="notice" style="margin-bottom:14px;">
      Спочатку створи користувача в <strong>Supabase → Authentication → Users → Invite user</strong>,
      потім повернись сюди і призначи роль.
    </div>
    <div class="form-row"><label class="form-label">UUID користувача (з Supabase Auth)</label>
      <input class="form-input" id="u-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/></div>
    <div class="form-row"><label class="form-label">Ім'я та прізвище</label>
      <input class="form-input" id="u-name" placeholder="Ім'я Прізвище"/></div>
    <div class="form-row"><label class="form-label">Роль</label>
      <select class="form-select" id="u-role" onchange="toggleCourseField(this.value)">
        <option value="admin">Адмін</option>
        <option value="mentor">Ментор</option>
        <option value="reception">Ресепшн</option>
      </select></div>
    <div class="form-row" id="course-field" style="display:none;"><label class="form-label">Курс ментора</label>
      <select class="form-select" id="u-course">
        ${courses.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
      </select></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Скасувати</button>
      <button class="btn-primary" onclick="saveUser()">Додати</button>
    </div>
  </div>`);
}

function toggleCourseField(role){
  const f = document.getElementById('course-field');
  if(f) f.style.display = role==='mentor'?'block':'none';
}

async function saveUser(){
  const id       = document.getElementById('u-id').value.trim();
  const name     = document.getElementById('u-name').value || 'Користувач';
  const role     = document.getElementById('u-role').value;
  const courseId = role==='mentor' ? parseInt(document.getElementById('u-course')?.value)||null : null;
  if(!id){ alert('Вкажи UUID'); return; }
  const { error } = await sb.from('users').upsert([{ id, name, role, course_id: courseId }]);
  if(error){ alert('Помилка: '+error.message); return; }
  closeModal();
  renderUsers();
}

function openEditUserModal(uid){
  const u = allUsers.find(x=>x.id===uid);
  showModal(`<div class="modal">
    <div class="modal-title">Змінити роль — ${u.name}</div>
    <div class="form-row"><label class="form-label">Роль</label>
      <select class="form-select" id="er-role">
        <option value="admin" ${u.role==='admin'?'selected':''}>Адмін</option>
        <option value="mentor" ${u.role==='mentor'?'selected':''}>Ментор</option>
        <option value="reception" ${u.role==='reception'?'selected':''}>Ресепшн</option>
      </select></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Скасувати</button>
      <button class="btn-primary" onclick="applyRole('${uid}')">Зберегти</button>
    </div>
  </div>`);
}

async function applyRole(uid){
  await sb.from('users').update({ role: document.getElementById('er-role').value }).eq('id', uid);
  closeModal();
  renderUsers();
}

// ── MODAL HELPERS ─────────────────────────────────────────────
function showModal(html){
  document.getElementById('modal-container').innerHTML =
    `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal(){ document.getElementById('modal-container').innerHTML=''; }

// ── INIT ──────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if(event==='SIGNED_IN' && session){
    await loadCurrentUser(session.user);
  } else if(event==='SIGNED_OUT'){
    document.getElementById('app').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
  }
});
</script>
</body>
</html>
