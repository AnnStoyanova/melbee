<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MelBee Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --honey:#F5C518;--honey-d:#C28A00;--amber:#FF9A1A;
  --black:#0F0F10;--ink:#16161A;--ink2:#1E1E24;--ink3:#26262E;
  --cream:#F4ECD8;--line:rgba(255,255,255,.07);
  --green:#50C878;--red:#E05050;--blue:#4A90D9;
  --font:'Nunito','Helvetica Neue',sans-serif;
}
body{font-family:var(--font);background:var(--black);color:var(--cream);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;}

/* Layout */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
.sidebar{background:var(--ink);border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.main{padding:28px 32px;overflow-y:auto;max-height:100vh;}

/* Sidebar */
.s-logo{padding:0 6px 18px;margin-bottom:10px;border-bottom:1px solid var(--line);}
.s-logo-svg{opacity:.8;}
.s-tag{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--honey);margin-top:6px;display:block;text-transform:uppercase;}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;color:rgba(244,236,216,.5);border:1px solid transparent;background:none;width:100%;text-align:left;transition:all .14s;font-family:var(--font);}
.nav-btn:hover{background:rgba(255,255,255,.05);color:var(--cream);}
.nav-btn.active{background:rgba(245,197,24,.1);color:var(--honey);border-color:rgba(245,197,24,.25);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-sep{height:1px;background:var(--line);margin:8px 0;}
.s-footer{font-size:10px;color:rgba(244,236,216,.25);padding:0 6px;margin-top:auto;line-height:1.7;}

/* Page header */
.page-hd{margin-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.page-title{font-size:26px;font-weight:900;color:var(--honey);letter-spacing:-.01em;}
.page-sub{font-size:12px;font-weight:700;color:rgba(244,236,216,.4);margin-top:2px;}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:22px;}
.card{background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
.card__val{font-size:30px;font-weight:900;color:var(--honey);line-height:1;}
.card__lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:rgba(244,236,216,.4);margin-top:4px;}

/* Panel */
.panel{background:var(--ink2);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.panel-hd{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.panel-title{font-size:15px;font-weight:800;color:var(--cream);}

/* Table */
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,236,216,.35);padding:10px 18px;text-align:left;border-bottom:1px solid var(--line);}
td{padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;font-weight:600;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:800;}
.badge-gold {background:rgba(245,197,24,.12);color:var(--honey);border:1px solid rgba(245,197,24,.25);}
.badge-green{background:rgba(80,200,120,.12);color:var(--green);border:1px solid rgba(80,200,120,.25);}
.badge-red  {background:rgba(224,80,80,.12); color:var(--red);  border:1px solid rgba(224,80,80,.25);}
.badge-blue {background:rgba(74,144,217,.12);color:var(--blue); border:1px solid rgba(74,144,217,.25);}

/* Buttons */
.btn{font-family:var(--font);font-size:13px;font-weight:800;padding:8px 16px;border:none;border-radius:9px;cursor:pointer;transition:all .14s;}
.btn-primary{background:var(--honey);color:var(--black);}
.btn-primary:hover{background:#FFD740;}
.btn-ghost{background:transparent;color:var(--cream);border:1px solid rgba(255,255,255,.14);}
.btn-ghost:hover{background:rgba(255,255,255,.06);}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(224,80,80,.25);}
.btn-danger:hover{background:rgba(224,80,80,.08);}
.btn-sm{font-size:11px;padding:5px 11px;}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* Forms */
.form-section{background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px;}
.form-title{font-size:14px;font-weight:800;color:var(--honey);margin-bottom:14px;}
.field-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field-label{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,236,216,.4);}
.field-input,.field-textarea,.field-select{width:100%;background:var(--ink3);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 12px;font-size:13px;font-weight:700;color:var(--cream);font-family:var(--font);outline:none;transition:border-color .14s;}
.field-input:focus,.field-textarea:focus,.field-select:focus{border-color:var(--honey);}
.field-textarea{resize:vertical;min-height:70px;}
.field-hint{font-size:11px;font-weight:700;color:rgba(244,236,216,.3);margin-top:3px;}

/* Whitelist */
.id-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding:14px 18px;}
.id-row{display:flex;align-items:center;gap:10px;background:var(--ink3);border:1px solid var(--line);border-radius:9px;padding:8px 12px;}
.id-row-val{flex:1;font-size:14px;font-weight:800;color:var(--honey);font-family:monospace;}
.id-row-meta{font-size:11px;font-weight:700;color:rgba(244,236,216,.35);}
.id-row-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;opacity:.5;padding:0 4px;transition:opacity .14s;font-family:var(--font);}
.id-row-del:hover{opacity:1;}
.id-add-row{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--line);}
.id-add-input{flex:1;background:var(--ink3);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 12px;font-size:14px;font-weight:800;color:var(--honey);font-family:monospace;outline:none;text-transform:uppercase;letter-spacing:.06em;}
.id-add-input:focus{border-color:var(--honey);}
.id-add-input::placeholder{color:rgba(244,236,216,.2);font-weight:700;text-transform:none;letter-spacing:0;}

/* Sliders */
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.slider-lbl{font-size:12px;font-weight:700;color:rgba(244,236,216,.55);width:170px;flex-shrink:0;}
.slider-lbl span{display:block;font-size:10px;font-weight:700;color:rgba(244,236,216,.3);margin-top:1px;}
input[type=range]{flex:1;accent-color:var(--honey);}
.slider-val{font-size:14px;font-weight:800;color:var(--honey);width:44px;text-align:right;}

/* Login screen */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--black);}
.login-box{background:var(--ink2);border:1px solid var(--line);border-radius:16px;padding:36px 32px;width:340px;}
.login-title{font-size:24px;font-weight:900;color:var(--honey);margin-bottom:6px;}
.login-sub{font-size:13px;font-weight:700;color:rgba(244,236,216,.4);margin-bottom:24px;}
.login-err{font-size:12px;font-weight:700;color:var(--red);margin-top:8px;min-height:18px;}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none;}
.toast{background:var(--green);color:#0a2010;font-weight:800;font-size:13px;padding:10px 18px;border-radius:10px;transform:translateY(80px);opacity:0;transition:all .25s;}
.toast.show{transform:translateY(0);opacity:1;}

/* Empty */
.empty{padding:36px 18px;text-align:center;color:rgba(244,236,216,.3);font-weight:700;font-size:13px;}

/* Loading */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(245,197,24,.3);border-top-color:var(--honey);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// admin/src/App.jsx — MelBee Admin Panel SPA

const API = window.MELBEE_API_URL || null;

const LS_A = {
  get: (k,d) => { try { const v=localStorage.getItem(k); return v!==null?JSON.parse(v):d; } catch { return d; } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
};

const DEFAULT_TEXTS_ADMIN = {
  startTitle:'MELBEE GP',
  startSub:'\u0422\u0430\u043f \u2014 \u0432\u0433\u043e\u0440\u0443 \u00b7 \u041f\u043e\u0434\u0432\u0456\u0439\u043d\u0438\u0439 \u0442\u0430\u043f \u2014 Turbo \u00b7 \u0417\u0431\u0438\u0440\u0430\u0439 \u043a\u0432\u0456\u0442\u0438!',
  startBtn:'\u0413\u0440\u0430\u0442\u0438!',
  startChip:'TELEGRAM MINI APP',
  startEyebrow:'EPISODE 01',
  startRecordLbl:'\u0420\u0435\u043a\u043e\u0440\u0434',
  startGamesLbl:'\u0406\u0433\u043e\u0440',
  affTitle:'AFFILIATE ID',
  affSub:'\u0412\u0432\u0435\u0434\u0438 \u0441\u0432\u0456\u0439 affiliate-\u043a\u043e\u0434 \u0449\u043e\u0431 \u043e\u0442\u0440\u0438\u043c\u0430\u0442\u0438 \u0431\u043e\u043d\u0443\u0441.',
  affFieldLabel:'YOUR PARTNER ID',
  affHint:'\u0417\u043d\u0430\u0439\u0434\u0438 \u043a\u043e\u0434 \u0443 \u043b\u0438\u0441\u0442\u0456 \u0430\u0431\u043e \u0443 \u0441\u0432\u043e\u0433\u043e \u043c\u0435\u043d\u0435\u0434\u0436\u0435\u0440\u0430.',
  affError:'Partner ID \u043d\u0435 \u0437\u043d\u0430\u0439\u0434\u0435\u043d\u043e. \u041f\u0435\u0440\u0435\u0432\u0456\u0440 \u043a\u043e\u0434.',
  affBtnReady:'\u041f\u041e\u0407\u0425\u0410\u041b\u0418 \u2192',
  affBtnEmpty:'\u0412\u0412\u0415\u0414\u0418 ID',
  affBonusVal:'+500 \u041c\u0415\u0414\u0423',
  affBonusSub:'\u0441\u0442\u0430\u0440\u0442\u043e\u0432\u0438\u0439 \u0431\u043e\u043d\u0443\u0441 \u0437\u0430 ID',
  affPaste:'\u0412\u0441\u0442\u0430\u0432\u0438\u0442\u0438 \u0437 \u0431\u0443\u0444\u0435\u0440\u0430',
  affSkip:'\u041f\u0420\u041e\u041f\u0423\u0421\u0422\u0418\u0422\u0418',
  hudTurboLabel:'Turbo',
  hudTurboActive:'TURBO!',
  goEmoji:'X',
  goTitle:'\u041a\u0406\u041d\u0415\u0426\u042c',
  goStatTpl:'\u0420\u0456\u0432\u0435\u043d\u044c {level} \u00b7 {flowers} \u043a\u0432\u0456\u0442\u043e\u043a',
  goRecord:'\u041d\u041e\u0412\u0418\u0419 \u0420\u0415\u041a\u041e\u0420\u0414!',
  goLbBtn:'\u041b\u0456\u0434\u0435\u0440\u0431\u043e\u0440\u0434',
  goRetryBtn:'\u0429\u0435 \u0440\u0430\u0437',
  lbTitle:'\u041b\u0456\u0434\u0435\u0440\u0431\u043e\u0440\u0434',
  lbEmpty:'\u0420\u0435\u043a\u043e\u0440\u0434\u0456\u0432 \u043d\u0435\u043c\u0430! \u0411\u0443\u0434\u044c \u043f\u0435\u0440\u0448\u0438\u043c',
  lbMe:'\u0432\u0438',
  playBtn:'\u0413\u0440\u0430\u0442\u0438 \u0437\u043d\u043e\u0432\u0443!',
  crashMsg1:'\u041e\u0439, \u0432\u0440\u0456\u0437\u0430\u0432\u0441\u044f!',
  crashMsg2:'\u041c\u0435\u0434 \u043d\u0435 \u0437\u0456\u0431\u0440\u0430\u0432!',
  crashMsg3:'\u0411\u0434\u0436\u0456\u043b\u043a\u0430 \u0432\u043f\u0430\u043b\u0430!',
  crashMsg4:'\u041f\u0430\u0440\u043a\u0430\u043d \u043f\u0435\u0440\u0435\u043c\u0456\u0433!',
  crashMsg5:'\u0421\u043f\u0440\u043e\u0431\u0443\u0439 \u0449\u0435 \u0440\u0430\u0437!',
  crashMsg6:'\u0422\u0443\u0440\u0431\u043e \u043d\u0435 \u0432\u0440\u044f\u0442\u0443\u0432\u0430\u043b\u043e!',
};
const DEFAULT_CONFIG_ADMIN = {
  gravity:'0.22', jumpVy:'-5.0', baseSpeed:'1.4', speedInc:'0.12',
  maxSpeed:'3.8', gapH:'210', lvlEvery:'5', turboBonus:'1.8', pipeW:'38',
};
const getMergedConfig = () => ({
  ...DEFAULT_TEXTS_ADMIN, ...DEFAULT_CONFIG_ADMIN,
  ...LS_A.get('mb_texts',{}), ...LS_A.get('mb_gameconfig',{}),
});

async function apiFetch(path, options = {}) {
  if (API) {
    const token = sessionStorage.getItem('mb_token');
    const res = await fetch(API + path, {
      headers: { 'Content-Type':'application/json', ...(token?{Authorization:`Bearer ${token}`}:{}) },
      ...options, body: options.body ? JSON.stringify(options.body) : undefined,
    });
    if (!res.ok) { const e=await res.json().catch(()=>({error:res.statusText})); throw Object.assign(new Error(e.error||'API error'),{status:res.status}); }
    return res.json();
  }
  return lsApi(path, options.method||'GET', options.body||{});
}

async function lsApi(path, method, body) {
  if (path==='/api/admin/stats') {
    const p=LS_A.get('mb_partner_ids',[]), lb=LS_A.get('mb_lb',[]);
    const wl=LS_A.get('mb_allowed_ids',[]);
    return {
      stats:{ total_sessions:p.reduce((s,x)=>s+x.games,0), unique_partners:p.length,
              top_score:p[0]?.bestScore||0, avg_score:p.length?Math.round(p.reduce((s,x)=>s+x.bestScore,0)/p.length):0 },
      leaderboard:lb.slice(0,10).map(e=>({partner_id:e.name,score:e.score})),
      partners:wl.map(id=>{const x=p.find(q=>q.id===id)||{};return{partner_id:id,is_active:true,games:x.games||0,best_score:x.bestScore||0,first_seen:x.firstSeen||new Date().toISOString(),last_seen:x.lastSeen||new Date().toISOString()};}),
    };
  }
  if (path.startsWith('/api/admin/sessions')) {
    const p=LS_A.get('mb_partner_ids',[]);
    return {sessions:p.map((x,i)=>({id:i+1,partner_id:x.id,tg_username:x.tgUsername||'n/a',score:x.bestScore,level:1,flowers:x.bestScore,created_at:x.lastSeen}))};
  }
  if (path==='/api/admin/partners'&&method==='GET') {
    const wl=LS_A.get('mb_allowed_ids',[]),p=LS_A.get('mb_partner_ids',[]);
    return {partners:wl.map(id=>{const x=p.find(q=>q.id===id)||{};return{partner_id:id,is_active:true,games:x.games||0,best_score:x.bestScore||0,first_seen:x.firstSeen||new Date().toISOString(),last_seen:x.lastSeen||new Date().toISOString()};})};
  }
  if (path==='/api/admin/partners'&&method==='POST') {
    const id=body.partnerId.toUpperCase(),list=LS_A.get('mb_allowed_ids',[]);
    if(!list.includes(id)){list.push(id);LS_A.set('mb_allowed_ids',list);}
    return {partner:{partner_id:id,is_active:true}};
  }
  if (path==='/api/admin/partners/bulk') {
    const list=LS_A.get('mb_allowed_ids',[]);let added=0;
    (body.partnerIds||[]).forEach(id=>{const u=id.toUpperCase();if(!list.includes(u)){list.push(u);added++;}});
    LS_A.set('mb_allowed_ids',list);return{added,skipped:(body.partnerIds||[]).length-added};
  }
  if (path.startsWith('/api/admin/partners/')&&method==='DELETE') {
    const id=decodeURIComponent(path.split('/').pop()).toUpperCase();
    LS_A.set('mb_allowed_ids',LS_A.get('mb_allowed_ids',[]).filter(x=>x!==id));return{ok:true};
  }
  if (path.startsWith('/api/admin/partners/')&&method==='PATCH') {
    const id=decodeURIComponent(path.split('/').pop()).toUpperCase();
    let list=LS_A.get('mb_allowed_ids',[]);
    body.isActive?(!list.includes(id)&&list.push(id)):list=list.filter(x=>x!==id);
    LS_A.set('mb_allowed_ids',list);return{partner:{partner_id:id,is_active:body.isActive}};
  }
  if (path==='/api/admin/config'&&method==='PUT') {
    const TK=Object.keys(DEFAULT_TEXTS_ADMIN),CK=Object.keys(DEFAULT_CONFIG_ADMIN),t={},c={};
    Object.entries(body).forEach(([k,v])=>{if(TK.includes(k))t[k]=v;if(CK.includes(k))c[k]=v;});
    LS_A.set('mb_texts',{...LS_A.get('mb_texts',{}), ...t});
    LS_A.set('mb_gameconfig',{...LS_A.get('mb_gameconfig',{}), ...c});
    return{ok:true,config:getMergedConfig()};
  }
  if (path==='/api/admin/config') return{config:getMergedConfig()};
  return{ok:true};
}

const { useState, useEffect, useCallback, useRef } = React;

// ── Config ────────────────────────────────────────────────────
const API = window.MELBEE_API_URL || 'https://api.yourdomain.com';

// ── API client ────────────────────────────────────────────────
async function apiFetch(path, options = {}) {
  const token = sessionStorage.getItem('mb_token');
  const res = await fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    ...options,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw Object.assign(new Error(err.error || 'API error'), { status: res.status });
  }
  return res.json();
}

// ── Toast system ──────────────────────────────────────────────
let _toastFn = null;
function useToastSystem() {
  const [toasts, setToasts] = useState([]);
  _toastFn = useCallback((msg, color = 'var(--green)') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, color }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2500);
  }, []);
  return toasts;
}

// ── Shared components ─────────────────────────────────────────
const Spinner = () => <span className="spinner"/>;

const Empty = ({ children }) => <div className="empty">{children}</div>;

function Table({ heads, rows, empty = 'Немає даних' }) {
  return (
    <table>
      <thead><tr>{heads.map((h,i) => <th key={i}>{h}</th>)}</tr></thead>
      <tbody>
        {!rows?.length
          ? <tr><td colSpan={heads.length}><Empty>{empty}</Empty></td></tr>
          : rows
        }
      </tbody>
    </table>
  );
}

// ── LOGIN PAGE ────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState('');

  const submit = async () => {
    setLoading(true); setError('');
    try {
      // Check against stored users first (localStorage mode)
      const storedUsers = LS_A.get('mb_admin_users', []);
      const foundUser = storedUsers.find(u => u.username === username);
      // admin default: password 'admin', others: base64 encoded
      const validDefault = username === 'admin' && password === (LS_A.get('mb_admin_pass','admin'));
      const validStored  = foundUser && foundUser.passwordHash === btoa(password);
      
      if (validDefault || validStored) {
        sessionStorage.setItem('mb_token', 'ls-mode');
        // Ensure admin user exists in users list
        if (!storedUsers.find(u => u.username === 'admin')) {
          storedUsers.unshift({ id:1, username:'admin', role:'superadmin', assignedPartners:[], createdAt:new Date().toISOString() });
          LS_A.set('mb_admin_users', storedUsers);
        }
        onLogin(username);
      } else {
        setError('Невірний логін або пароль');
      }
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const onKey = e => { if (e.key === 'Enter') submit(); };

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-title">🐝 MelBee</div>
        <div className="login-sub">Адміністративна панель</div>
        <div className="field-group">
          <label className="field-label">Логін</label>
          <input className="field-input" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={onKey} autoFocus/>
        </div>
        <div className="field-group">
          <label className="field-label">Пароль</label>
          <input className="field-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={onKey}/>
        </div>
        <button className="btn btn-primary" style={{width:'100%',marginTop:4}} onClick={submit} disabled={loading}>
          {loading ? <Spinner/> : 'Увійти →'}
        </button>
        <div className="login-err">{error}</div>
      </div>
    </div>
  );
}

// ── WHITELIST PAGE ────────────────────────────────────────────
function WhitelistPage() {
  const [partners, setPartners] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [input, setInput]       = useState('');
  const [bulkOpen, setBulkOpen] = useState(false);
  const [bulkText, setBulkText] = useState('');

  const load = () => {
    setLoading(true);
    apiFetch('/api/admin/partners')
      .then(d => { setPartners(d.partners); setLoading(false); })
      .catch(e => { toast(e.message,'var(--red)'); setLoading(false); });
  };
  useEffect(load, []);

  const addOne = async () => {
    const val = input.trim().toUpperCase();
    if (!val || !/^[A-Z0-9_-]{2,32}$/.test(val)) { toast('Невірний формат ID','var(--red)'); return; }
    try {
      await apiFetch('/api/admin/partners', { method:'POST', body:{ partnerId: val } });
      setInput(''); load(); toast(`✓ ${val} додано`);
    } catch(e) { toast(e.message,'var(--red)'); }
  };

  const remove = async (id) => {
    if (!confirm(`Видалити ${id}?`)) return;
    try { await apiFetch(`/api/admin/partners/${id}`,{method:'DELETE'}); load(); toast(`Видалено ${id}`,'var(--amber)'); }
    catch(e) { toast(e.message,'var(--red)'); }
  };

  const toggle = async (id, active) => {
    try { await apiFetch(`/api/admin/partners/${id}`,{method:'PATCH',body:{isActive:active}}); load(); }
    catch(e) { toast(e.message,'var(--red)'); }
  };

  const saveBulk = async () => {
    const ids = bulkText.split(/[\n,;]+/).map(s=>s.trim().toUpperCase().replace(/^#/,'')).filter(s=>/^[A-Z0-9_-]{2,32}$/.test(s));
    if (!ids.length) { toast('Не знайдено валідних ID','var(--red)'); return; }
    try {
      const r = await apiFetch('/api/admin/partners/bulk',{method:'POST',body:{partnerIds:ids}});
      setBulkText(''); setBulkOpen(false); load();
      toast(`✓ Додано ${r.added} ID${r.skipped?' ('+r.skipped+' пропущено)':''}`);
    } catch(e) { toast(e.message,'var(--red)'); }
  };

  const exportTxt = () => {
    const active = partners.filter(p=>p.is_active).map(p=>p.partner_id);
    const a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(active.join('\n'));
    a.download = 'melbee_whitelist.txt'; a.click();
  };

  const isOpen = partners.length === 0;
  const active = partners.filter(p=>p.is_active).length;

  return (
    <div>
      <div className="page-hd">
        <div>
          <div className="page-title">✅ Whitelist</div>
          <div className="page-sub">Партнери що можуть входити в гру</div>
        </div>
        <span className={`badge ${isOpen?'badge-blue':'badge-green'}`}>
          {isOpen ? '🔓 Відкритий режим' : `🔒 ${active} активних ID`}
        </span>
      </div>

      {isOpen && (
        <div style={{background:'rgba(74,144,217,.08)',border:'1px solid rgba(74,144,217,.25)',borderRadius:12,padding:'12px 16px',marginBottom:16,fontSize:13,fontWeight:700,color:'var(--blue)'}}>
          ℹ️ Список порожній — будь-який коректний Partner ID пройде валідацію.
          Додай перший ID щоб увімкнути суворий режим.
        </div>
      )}

      <div className="panel">
        <div className="panel-hd">
          <span className="panel-title">Partner IDs ({partners.length})</span>
          <div className="btn-row">
            <button className="btn btn-ghost btn-sm" onClick={()=>setBulkOpen(v=>!v)}>📋 Масово</button>
            <button className="btn btn-ghost btn-sm" onClick={exportTxt}>⬇ Експорт</button>
          </div>
        </div>
        {loading ? <div style={{padding:24,textAlign:'center'}}><Spinner/></div> : (
          partners.length === 0
            ? <Empty>Додай перший Partner ID нижче</Empty>
            : <div className="id-list">
                {partners.map(p => (
                  <div key={p.partner_id} className="id-row" style={{opacity:p.is_active?1:.5}}>
                    <span className="id-row-val">#{p.partner_id}</span>
                    <span className="id-row-meta">{p.games||0} ігор · {p.best_score||0} 🌸</span>
                    <button className="btn btn-ghost btn-sm" onClick={()=>toggle(p.partner_id,!p.is_active)}>
                      {p.is_active?'Деактивувати':'Активувати'}
                    </button>
                    <button className="id-row-del" onClick={()=>remove(p.partner_id)}>×</button>
                  </div>
                ))}
              </div>
        )}
        <div className="id-add-row">
          <input className="id-add-input" value={input} placeholder="PARTNER001"
            onChange={e=>setInput(e.target.value.toUpperCase())}
            onKeyDown={e=>e.key==='Enter'&&addOne()}
            maxLength={32}/>
          <button className="btn btn-primary" onClick={addOne}>+ Додати</button>
        </div>
      </div>

      {bulkOpen && (
        <div className="form-section">
          <div className="form-title">Масове додавання</div>
          <div className="field-group">
            <label className="field-label">Partner IDs (кожен з нового рядка або через кому)</label>
            <textarea className="field-textarea" value={bulkText} onChange={e=>setBulkText(e.target.value)}
              placeholder={'PARTNER001\nPARTNER002\nPARTNER003'} style={{minHeight:120}}/>
          </div>
          <div className="btn-row">
            <button className="btn btn-primary" onClick={saveBulk}>Додати всі</button>
            <button className="btn btn-ghost" onClick={()=>setBulkOpen(false)}>Скасувати</button>
          </div>
        </div>
      )}
    </div>
  );
}

function SessionsPage() {
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [filter, setFilter]     = useState('');

  const load = (pid) => {
    setLoading(true);
    apiFetch(`/api/admin/sessions?limit=100${pid?`&partnerId=${pid}`:''}`)
      .then(d => { setSessions(d.sessions); setLoading(false); })
      .catch(e => { toast(e.message,'var(--red)'); setLoading(false); });
  };
  useEffect(() => load(), []);

  const exportCSV = () => {
    const rows = [['ID','Partner ID','TG Username','Score','Level','Flowers','Date'],
      ...sessions.map(s=>[s.id,s.partner_id||'—',s.tg_username||'—',s.score,s.level,s.flowers,new Date(s.created_at).toLocaleString('uk')])];
    const csv = rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download='melbee_sessions.csv'; a.click();
  };

  return (
    <div>
      <div className="page-hd">
        <div>
          <div className="page-title">📋 Сесії</div>
          <div className="page-sub">Всі зіграні партії</div>
        </div>
        <div className="btn-row">
          <input className="field-input" style={{width:180}} value={filter}
            onChange={e=>{setFilter(e.target.value.toUpperCase());}}
            placeholder="Фільтр за Partner ID"
            onKeyDown={e=>e.key==='Enter'&&load(filter||undefined)}/>
          <button className="btn btn-ghost btn-sm" onClick={()=>load(filter||undefined)}>Шукати</button>
          <button className="btn btn-ghost btn-sm" onClick={exportCSV}>⬇ CSV</button>
        </div>
      </div>
      <div className="panel">
        {loading ? <div style={{padding:24,textAlign:'center'}}><Spinner/></div> : (
          <Table
            heads={['Partner ID','TG','Рахунок','Рівень','Квіти','Дата']}
            empty="Немає сесій"
            rows={sessions.map((s,i) => (

                <td style={{color:'rgba(244,236,216,.55)'}}>{s.tg_username||'—'}</td>
                <td style={{fontWeight:800,color:'var(--honey)'}}>{s.score}</td>
                <td>{s.level}</td>
                <td>{s.flowers} 🌸</td>
                <td style={{fontSize:11,color:'rgba(244,236,216,.4)'}}>{new Date(s.created_at).toLocaleString('uk')}</td>
              </tr>
            ))}
          />
        )}

  );

            </div>

        </div>
      ))}
    </div>
  );
}

// ── GAME CONFIG PAGE ──────────────────────────────────────────
const SLIDERS = [
  { group:'Фізика', items:[
    { key:'gravity',   label:'Гравітація', hint:'Сила тяжіння вниз', min:.05, max:.6, step:.01 },
    { key:'jumpVy',    label:'Сила стрибка', hint:'Negative = вгору', min:-10, max:-2, step:.1 },
  ]},
  { group:'Швидкість', items:[
    { key:'baseSpeed', label:'Початкова швидкість', hint:'px/frame', min:.5, max:4, step:.1 },
    { key:'speedInc',  label:'Прискорення на рівень', hint:'px/frame за рівень', min:.01, max:.5, step:.01 },
    { key:'maxSpeed',  label:'Максимальна швидкість', hint:'px/frame без Турбо', min:2, max:10, step:.1 },
  ]},
  { group:'Перешкоди', items:[
    { key:'gapH',      label:'Зазор між заборами', hint:'px', min:100, max:400, step:5 },
    { key:'lvlEvery',  label:'Квіток для нового рівня', hint:'штук', min:1, max:50, step:1 },
  ]},
];

function GameConfigPage() {
  const [values, setValues] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving]   = useState(false);

  useEffect(() => {
    apiFetch('/api/admin/config')
      .then(d => { setValues(d.config); setLoading(false); })
      .catch(e => { toast(e.message,'var(--red)'); setLoading(false); });
  }, []);

  const save = async () => {
    setSaving(true);
    try {
      await apiFetch('/api/admin/config', { method:'PUT', body: values });
      toast('✓ Параметри збережено. Перезапусти гру.');
    } catch(e) { toast(e.message,'var(--red)'); }
    finally { setSaving(false); }
  };

  if (loading) return <div style={{padding:40}}><Spinner/></div>;

  return (
    <div>
      <div className="page-hd">
        <div><div className="page-title">🎮 Параметри гри</div><div className="page-sub">Вступають в силу при наступному запуску гри гравцем</div></div>
        <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?<Spinner/>:'💾 Зберегти'}</button>
      </div>
      {SLIDERS.map(({ group, items }) => (
        <div key={group} className="form-section">
          <div className="form-title">{group}</div>
          {items.map(({ key, label, hint, min, max, step }) => {
            const val = parseFloat(values[key] ?? 0);
            return (
              <div key={key} className="slider-row">
                <div className="slider-lbl">{label}<span>{hint}</span></div>
                <input type="range" min={min} max={max} step={step} value={val}
                  onChange={e => setValues(v => ({...v, [key]: e.target.value}))}/>
                <div className="slider-val">{val}</div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ── USERS PAGE (superadmin only) ─────────────────────────────
function UsersPage({ currentUser }) {
  const [users, setUsers]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm]         = useState({ username:'', password:'', role:'manager', assignedPartners:[] });
  const [partnerInput, setPartnerInput] = useState('');
  const [saving, setSaving]     = useState(false);

  const load = () => {
    setLoading(true);
    // Load from localStorage
    const stored = LS_A.get('mb_admin_users', [
      { id:1, username:'admin', role:'superadmin', assignedPartners:[], createdAt: new Date().toISOString() }
    ]);
    setUsers(stored);
    setLoading(false);
  };
  useEffect(load, []);

  const saveUser = () => {
    if (!form.username.trim() || !form.password.trim()) {
      toast('Введи логін та пароль', 'var(--red)'); return;
    }
    if (form.username.length < 3) {
      toast('Логін мінімум 3 символи', 'var(--red)'); return;
    }
    setSaving(true);
    const stored = LS_A.get('mb_admin_users', []);
    if (stored.find(u => u.username === form.username)) {
      toast('Такий логін вже існує', 'var(--red)'); setSaving(false); return;
    }
    const newUser = {
      id: Date.now(),
      username: form.username.trim(),
      passwordHash: btoa(form.password), // base64 — для localStorage достатньо
      role: form.role,
      assignedPartners: form.assignedPartners,
      createdAt: new Date().toISOString(),
    };
    stored.push(newUser);
    LS_A.set('mb_admin_users', stored);
    setForm({ username:'', password:'', role:'manager', assignedPartners:[] });
    setShowForm(false);
    setSaving(false);
    load();
    toast(`✓ Юзер ${newUser.username} створено`);
  };

  const deleteUser = (id, username) => {
    if (username === 'admin') { toast('Не можна видалити головного адміна', 'var(--red)'); return; }
    if (!confirm(`Видалити юзера ${username}?`)) return;
    const stored = LS_A.get('mb_admin_users', []).filter(u => u.id !== id);
    LS_A.set('mb_admin_users', stored);
    load();
    toast(`Юзера ${username} видалено`, 'var(--amber)');
  };

  const addPartnerToForm = () => {
    const val = partnerInput.trim().toUpperCase();
    if (!val || !/^[A-Z0-9_-]{2,32}$/.test(val)) { toast('Невірний формат Partner ID', 'var(--red)'); return; }
    if (form.assignedPartners.includes(val)) { toast('Вже додано', 'var(--amber)'); return; }
    setForm(f => ({ ...f, assignedPartners: [...f.assignedPartners, val] }));
    setPartnerInput('');
  };
  const removePartnerFromForm = (p) => setForm(f => ({ ...f, assignedPartners: f.assignedPartners.filter(x => x !== p) }));

  const ROLES = { superadmin:'Суперадмін', manager:'Менеджер' };
  const ROLE_COLORS = { superadmin:'badge-gold', manager:'badge-blue' };

  return (
    <div>
      <div className="page-hd">
        <div>
          <div className="page-title">👥 Юзери адмінки</div>
          <div className="page-sub">Управління доступом до панелі</div>
        </div>
        <button className="btn btn-primary" onClick={() => setShowForm(v => !v)}>
          {showForm ? '✕ Скасувати' : '+ Новий юзер'}
        </button>
      </div>

      {/* ── New user form ── */}
      {showForm && (
        <div className="form-section" style={{marginBottom:20}}>
          <div className="form-title">Новий юзер</div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
            <div className="field-group">
              <label className="field-label">Логін</label>
              <input className="field-input" value={form.username}
                onChange={e => setForm(f => ({...f, username: e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,'')}))}
                placeholder="manager_anna" autoComplete="off"/>
            </div>
            <div className="field-group">
              <label className="field-label">Пароль</label>
              <input className="field-input" type="password" value={form.password}
                onChange={e => setForm(f => ({...f, password: e.target.value}))}
                placeholder="мінімум 6 символів" autoComplete="new-password"/>
            </div>
          </div>
          <div className="field-group">
            <label className="field-label">Роль</label>
            <select className="field-select" value={form.role}
              onChange={e => setForm(f => ({...f, role: e.target.value}))}>
              <option value="superadmin">Суперадмін — бачить все, керує юзерами</option>
              <option value="manager">Менеджер — тільки свої Partner IDs</option>
            </select>
          </div>
          {form.role === 'manager' && (
            <div className="field-group">
              <label className="field-label">Partner IDs цього менеджера</label>
              <div style={{display:'flex', gap:8, marginBottom:8}}>
                <input className="field-input" value={partnerInput}
                  onChange={e => setPartnerInput(e.target.value.toUpperCase())}
                  onKeyDown={e => e.key==='Enter' && addPartnerToForm()}
                  placeholder="PARTNER001" style={{fontFamily:'monospace', fontWeight:800}}/>
                <button className="btn btn-ghost" onClick={addPartnerToForm}>+</button>
              </div>
              {form.assignedPartners.length > 0 && (
                <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
                  {form.assignedPartners.map(p => (
                    <span key={p} style={{display:'inline-flex', alignItems:'center', gap:5, background:'rgba(245,197,24,.1)', border:'1px solid rgba(245,197,24,.25)', borderRadius:6, padding:'3px 10px', fontSize:12, fontWeight:800, color:'var(--honey)', fontFamily:'monospace'}}>
                      #{p}
                      <button onClick={() => removePartnerFromForm(p)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:14,padding:0,lineHeight:1}}>×</button>
                    </span>
                  ))}
                </div>
              )}
              <div className="field-hint" style={{marginTop:6}}>
                Менеджер буде бачити статистику тільки цих партнерів. Якщо не вказано — бачить всіх.
              </div>
            </div>
          )}
          <div className="btn-row" style={{marginTop:4}}>
            <button className="btn btn-primary" onClick={saveUser} disabled={saving}>
              {saving ? '...' : 'Створити юзера'}
            </button>
            <button className="btn btn-ghost" onClick={() => setShowForm(false)}>Скасувати</button>
          </div>
        </div>
      )}

      {/* ── Users table ── */}
      <div className="panel">
        <div className="panel-hd"><span className="panel-title">Всі юзери ({users.length})</span></div>
        {loading ? <div style={{padding:24,textAlign:'center'}}><Spinner/></div> : (
          <Table
            heads={['Логін','Роль','Partner IDs','Дата створення','Дії']}
            empty="Немає юзерів"
            rows={users.map(u => (
              <tr key={u.id}>
                <td style={{fontWeight:800}}>
                  {u.username}
                  {u.username === currentUser && <span className="badge badge-green" style={{marginLeft:8}}>Це ви</span>}
                </td>
                <td><span className={`badge ${ROLE_COLORS[u.role]||'badge-blue'}`}>{ROLES[u.role]||u.role}</span></td>
                <td>
                  {u.role === 'superadmin'
                    ? <span style={{color:'rgba(244,236,216,.35)',fontSize:12}}>Всі</span>
                    : u.assignedPartners?.length
                      ? <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                          {u.assignedPartners.map(p => (
                            <span key={p} style={{fontSize:11,fontWeight:800,color:'var(--honey)',fontFamily:'monospace'}}>#{p}</span>
                          ))}
                        </div>
                      : <span style={{color:'rgba(244,236,216,.35)',fontSize:12}}>Всі</span>
                  }
                </td>
                <td style={{fontSize:11,color:'rgba(244,236,216,.4)'}}>
                  {new Date(u.createdAt).toLocaleDateString('uk')}
                </td>
                <td>
                  {u.username !== 'admin' && u.username !== currentUser && (
                    <button className="btn btn-danger btn-sm" onClick={() => deleteUser(u.id, u.username)}>
                      Видалити
                    </button>
                  )}
                </td>
              </tr>
            ))}
          />
        )}
      </div>

      {/* ── Info box ── */}
      <div className="form-section" style={{background:'rgba(74,144,217,.06)',borderColor:'rgba(74,144,217,.2)'}}>
        <div className="form-title" style={{color:'var(--blue)'}}>ℹ️ Як працюють ролі</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,fontSize:13,fontWeight:600,color:'rgba(244,236,216,.6)',lineHeight:1.6}}>
          <div>
            <div style={{color:'var(--honey)',fontWeight:800,marginBottom:4}}>⭐ Суперадмін</div>
            Бачить всіх партнерів і всю статистику<br/>
            Може додавати/видаляти юзерів<br/>
            Може змінювати тексти і параметри гри<br/>
            Повний доступ до всіх розділів
          </div>
          <div>
            <div style={{color:'var(--blue)',fontWeight:800,marginBottom:4}}>👤 Менеджер</div>
            Бачить тільки призначених партнерів<br/>
            Може додавати нові Partner IDs<br/>
            Не може змінювати тексти і параметри<br/>
            Не бачить інших юзерів
          </div>
        </div>
      </div>
    </div>
  );
}


function TgUsersPage() {
  const users = LS_A.get('mb_tg_users', []);
  const medals = ['#1','#2','#3'];

  const exportCSV = () => {
    if (!users.length) { toast('No data', 'var(--red)'); return; }
    const rows = [
      ['TG ID','Username','First Name','Last Name','Partner ID','Games','Best Score','First Seen','Last Seen'],
      ...users.map(u => [
        u.id, u.username||'-', u.firstName||'-', u.lastName||'-',
        u.partnerId||'-', u.games, u.bestScore,
        new Date(u.firstSeen).toLocaleString('uk'),
        new Date(u.lastSeen).toLocaleString('uk'),
      ])
    ];
    const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
    a.download = 'melbee_tg_users.csv'; a.click();
  };

  return (
    <div>
      <div className="page-hd">
        <div>
          <div className="page-title">TG Юзери</div>
          <div className="page-sub">Всі гравці з Telegram ID</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={exportCSV}>Export CSV</button>
      </div>
      <div className="cards">
        <div className="card"><div className="card__val">{users.length}</div><div className="card__lbl">Унікальних</div></div>
        <div className="card"><div className="card__val">{users.filter(u=>u.partnerId).length}</div><div className="card__lbl">З Partner ID</div></div>
        <div className="card"><div className="card__val">{users.reduce((s,u)=>s+(u.games||0),0)}</div><div className="card__lbl">Ігор</div></div>
      </div>
      <div className="panel">
        <div className="panel-hd"><span className="panel-title">Список ({users.length})</span></div>
        {users.length === 0
          ? <div className="empty">Дані збережуться після першої гри в Telegram.</div>
          : <table>
              <thead><tr>
                <th>#</th><th>TG ID</th><th>Username</th><th>Ім&apos;я</th>
                <th>Partner ID</th><th>Ігор</th><th>Рекорд</th><th>Перший вхід</th>
              </tr></thead>
              <tbody>
                {users.sort((a,b)=>(b.bestScore||0)-(a.bestScore||0)).map((u,i) => (
                  <tr key={u.id}>
                    <td style={{color:'rgba(244,236,216,.4)'}}>{i+1}</td>
                    <td><code style={{fontSize:11,color:'rgba(244,236,216,.5)',background:'rgba(255,255,255,.05)',padding:'2px 6px',borderRadius:4}}>{u.id}</code></td>
                    <td>{u.username ? <span style={{color:'var(--blue)'}}>@{u.username}</span> : <span style={{opacity:.3}}>-</span>}</td>
                    <td>{[u.firstName,u.lastName].filter(Boolean).join(' ')||<span style={{opacity:.3}}>-</span>}</td>
                    <td>{u.partnerId ? <span className="badge badge-gold">#{u.partnerId}</span> : <span style={{opacity:.3,fontSize:12}}>-</span>}</td>
                    <td>{u.games||0}</td>
                    <td style={{fontWeight:800,color:'var(--honey)'}}>{u.bestScore||0}</td>
                    <td style={{fontSize:11,color:'rgba(244,236,216,.4)'}}>{u.firstSeen?new Date(u.firstSeen).toLocaleDateString('uk'):'-'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
        }
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────
const SUPERADMIN_PAGES = [
  { id:'dashboard',  icon:'📊', label:'Дашборд' },
  { id:'whitelist',  icon:'✅', label:'Whitelist' },
  { id:'sessions',   icon:'📋', label:'Сесії' },
  { sep: true },
  { id:'texts',      icon:'✏️',  label:'Тексти' },
  { id:'gameconfig', icon:'🎮', label:'Параметри гри' },
  { sep: true },
  { id:'users',      icon:'👥', label:'Юзери' },
  { id:'tgusers',    icon:'✈️',  label:'TG Юзери' },
  { id:'settings',   icon:'⚙️',  label:'Налаштування' },
];

const MANAGER_PAGES = [
  { id:'dashboard',  icon:'📊', label:'Дашборд' },
  { id:'whitelist',  icon:'✅', label:'Whitelist' },
  { id:'sessions',   icon:'📋', label:'Сесії' },
];

function App() {
  const [authed, setAuthed]   = useState(!!sessionStorage.getItem('mb_token'));
  const [user, setUser]       = useState(sessionStorage.getItem('mb_user') || '');
  const [page, setPage]       = useState('dashboard');
  const toasts                = useToastSystem();

  const onLogin = (username) => {
    sessionStorage.setItem('mb_user', username);
    setUser(username); setAuthed(true);
  };
  const onLogout = () => {
    sessionStorage.removeItem('mb_token'); sessionStorage.removeItem('mb_user');
    setAuthed(false); setUser('');
  };

  if (!authed) return <LoginPage onLogin={onLogin}/>;

  const role = LS_A.get('mb_admin_users', []).find(u => u.username === user)?.role || 'superadmin';
  const isSuperadmin = role === 'superadmin';
  const PAGES = isSuperadmin ? SUPERADMIN_PAGES : MANAGER_PAGES;

  // Get assigned partners for manager role filtering
  const assignedPartners = !isSuperadmin
    ? (LS_A.get('mb_admin_users', []).find(u => u.username === user)?.assignedPartners || [])
    : [];

  const renderPage = () => {
    switch(page) {
      case 'dashboard':  return <DashboardPage assignedPartners={assignedPartners}/>;
      case 'whitelist':  return <WhitelistPage assignedPartners={assignedPartners}/>;
      case 'sessions':   return <SessionsPage  assignedPartners={assignedPartners}/>;
      case 'texts':      return isSuperadmin ? <TextsPage/> : null;
      case 'gameconfig': return isSuperadmin ? <GameConfigPage/> : null;
      case 'users':      return isSuperadmin ? <UsersPage currentUser={user}/> : null;
      case 'tgusers':    return isSuperadmin ? <TgUsersPage/> : null;
      case 'settings':   return <SettingsPage username={user} role={role} onLogout={onLogout}/>;
      default:           return null;
    }
  };

  return (
    <>
      <div className="layout">
        <aside className="sidebar">
          <div className="s-logo">
            <div className="s-logo-svg" dangerouslySetInnerHTML={{__html: LOGO}}/>
            <span className="s-tag">Admin Panel</span>
          </div>
          {PAGES.map((p, i) =>
            p.sep
              ? <div key={i} className="nav-sep"/>
              : <button key={p.id} className={`nav-btn${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}>
                  <span className="nav-icon">{p.icon}</span> {p.label}
                </button>
          )}
          <div className="s-footer">
            MelBee Admin v2.0<br/>
            <span style={{color:'var(--honey)',fontWeight:800}}>{isSuperadmin ? '⭐ Суперадмін' : '👤 Менеджер'}</span><br/>
            <span style={{opacity:.5}}>{user}</span>
          </div>
        </aside>
        <main className="main">{renderPage()}</main>
      </div>

      {/* Toast notifications */}
      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className="toast show" style={{background:t.color}}>{t.msg}</div>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
